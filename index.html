<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FUNPACE — Training Club</title>
    <meta name="description" content="Estamos preparando o seu acesso ao clube." />

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      :root {
        --off-black: #0a0a0a;
        --deep-gray: #141414;
        --border-subtle: rgba(255, 255, 255, 0.08);
        --text-soft: rgba(255, 255, 255, 0.72);
        --neon-volt: #c8ff00;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        color: #fff;
        font-family: 'DM Sans', sans-serif;
        background-color: var(--off-black);
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.24;
        background-image: radial-gradient(circle at 20% 20%, rgba(200, 255, 0, 0.16), transparent 38%),
          radial-gradient(circle at 80% 80%, rgba(0, 85, 255, 0.14), transparent 42%);
      }

      .launch-wrap {
        width: min(720px, calc(100% - 32px));
        border: 1px solid var(--border-subtle);
        border-radius: 20px;
        background: linear-gradient(180deg, rgba(20, 20, 20, 0.95), rgba(10, 10, 10, 0.96));
        box-shadow: 0 0 0 1px rgba(200, 255, 0, 0.06), 0 0 48px rgba(200, 255, 0, 0.12);
        padding: clamp(24px, 5vw, 44px);
        position: relative;
      }

      .tag {
        width: fit-content;
        font-family: 'Space Mono', monospace;
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #000;
        background: var(--neon-volt);
        padding: 8px 12px;
        border-radius: 999px;
        margin-bottom: 20px;
      }

      h1 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: clamp(48px, 10vw, 96px);
        line-height: 0.95;
        letter-spacing: 0.02em;
        margin-bottom: 18px;
      }

      h1 span {
        color: var(--neon-volt);
        text-shadow: 0 0 24px rgba(200, 255, 0, 0.45);
      }

      p {
        font-size: clamp(16px, 2.4vw, 20px);
        line-height: 1.6;
        color: var(--text-soft);
        max-width: 54ch;
      }

      p + p {
        margin-top: 10px;
      }

      .date {
        color: #fff;
        font-weight: 700;
      }

      .loader {
        margin-top: 32px;
        display: grid;
        gap: 12px;
      }

      .loader-label {
        font-family: 'Space Mono', monospace;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 12px;
        color: var(--text-soft);
      }

      .bar {
        height: 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
        position: relative;
      }

      .bar::after {
        content: '';
        position: absolute;
        inset: 0;
        width: 35%;
        border-radius: inherit;
        background: linear-gradient(90deg, rgba(200, 255, 0, 0.2), var(--neon-volt), rgba(200, 255, 0, 0.2));
        box-shadow: 0 0 24px rgba(200, 255, 0, 0.45);
        animation: loading 2.2s cubic-bezier(0.45, 0, 0.55, 1) infinite;
      }

      .dots {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--neon-volt);
        animation: pulse 1.2s ease-in-out infinite;
      }

      .dot:nth-child(2) {
        animation-delay: 0.15s;
      }

      .dot:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes loading {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(320%);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.35;
          transform: scale(0.95);
        }
        50% {
          opacity: 1;
          transform: scale(1.12);
        }
      }
    </style>
  </head>
  <body>
    <main class="launch-wrap" role="main" aria-live="polite">
      <div class="tag">Acesso em preparação</div>

      <h1>
        Estamos preparando
        <span>o seu acesso</span>
      </h1>

      <p>Logo mais você poderá acessar o clube.</p>
      <p>
        A sua assinatura começará a contar a partir do início dos treinos em
        <span class="date">01/04</span>.
      </p>

      <section class="loader" aria-label="Status de carregamento">
        <span class="loader-label">Loading</span>
        <div class="bar" aria-hidden="true"></div>
        <div class="dots" aria-hidden="true">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </section>
    </main>
  </body>
</html>
